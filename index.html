<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <input type="button" id="add-order-button" value="Add Forwarder" onclick="openForwarderForm()"/>
    <input type="button" id="add-order-button" value="Add Order" onclick="openOrderForm()"/>
    
    <div id="order-container">
        <div id="order-header-rows">
            <div id="order-header-columns">
                <div class="order-header-content">ID</div>
                <div class="order-header-content">Sender</div>
                <div class="order-header-content">Loading address</div>
                <div class="order-header-content">Loading date</div>
                <div class="order-header-content">Receiver</div>
                <div class="order-header-content">Delivery address</div>
                <div class="order-header-content">Delivery date</div>
                <div class="order-header-content">PO</div>
                <div class="order-header-content">Pallets</div>
                <div class="order-header-content">Weight</div>
                <div class="order-header-content">Forwarder</div>
                <div class="order-header-content">Cost</div>
                <div class="order-header-content">REF</div>
                <div class="order-header-content">Customs</div>
                <div class="order-header-content order-button">Open</div>
                <div class="order-header-content order-button">Edit</div>
                <div class="order-header-content order-button">Delete</div>
            </div>
            
        </div>
        <div id="order-rows">
            <div id="order-content">Transport order Nr 1</div>
            <div id="order-content">Transport order Nr 2</div>
        </div>
    </div>

    <!-- Form to add new transport order to database -->
    <div id="enterOrder-container">
        <div id="enterOrder-rows">
            <form id="order-form">
                <label for="fname">Sender</label>
                <input type="text" id="fname" name="firstname" placeholder="Choose sender...">

                <label for="lname">Loading Address</label>
                <input type="text" id="lname" name="lastname" placeholder="">

                <label for="loadingDate">Loading Date:</label>
                <input type="date" id="loadingDate" name="loadingDate">

                <label for="fname">Receiver</label>
                <input type="text" id="fname" name="firstname" placeholder="Choose receiver...">

                <label for="lname">Unloading Address</label>
                <input type="text" id="lname" name="lastname" placeholder="">

                <label for="unloadingDate">Unlaoding Date:</label>
                <input type="date" id="unloadingDate" name="unloadingDate">

                <label for="sappo">SAP PO</label>
                <input type="text" id="sappo" name="sappo" placeholder="">

                <label for="pallets">Pallets</label>
                <input type="text" id="pallets" name="pallets" placeholder="">

                <label for="weight">Weight</label>
                <input type="text" id="weight" name="weight" placeholder="">

                <label for="country">Temperature control</label>
                <select id="country" name="country">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>

                <label for="customs">Customs</label>
                <select id="customs" name="customs">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
                
                <div id="insertCancel-button-field">
                    <input id="button-confirm" type="submit" value="Submit" onclick="insertNewOrder()">
                    <input id="button-cancel" type="submit" value="Cancel" onclick="cancelNewOrder()">
                </div>
            </form>
        </div>
    </div>

    <!-- Form to add new forwarder to database -->
    <div id="forwarder-container">
        <div id="enterOrder-rows">
            <form id="forwarder-form">
                <label for="forwardername">Forwarder name</label>
                <input type="text" id="forwardername" name="forwardername" placeholder="enter company name...">

                <label for="forwarderregistration">Registration number</label>
                <input type="text" id="forwarderregistration" name="forwarderregistration" placeholder="enter registration number...">

                <label for="forwardervat">VAT number</label>
                <input type="text" id="forwardervat" name="forwardervat" placeholder="enter VAT number...">

                <label for="forwarderaddress">Address</label>
                <input type="text" id="forwarderaddress" name="forwarderaddress" placeholder="enter address...">

                <label for="forwardercountry">Country</label>
                <input type="text" id="forwardercountry" name="forwardercountry" placeholder="enter country...">

                <label for="forwarderphone">Phone number</label>
                <input type="date" id="forwarderphone" name="forwarderphone" placeholder="enter phone number...">

                <label for="forwarderemail">E-mail</label>
                <input type="date" id="forwarderemail" name="forwarderemail" placeholder="enter e-mail...">
                
                <div id="insertCancel-button-field">
                    <button id="button-confirm" type="submit" value="Submit" onclick="insertNewForwarder()"></button>
                    <button id="button-cancel" type="submit" value="Cancel" onclick="cancelNewForwarder()"></button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
